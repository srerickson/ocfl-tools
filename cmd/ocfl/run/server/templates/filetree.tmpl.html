{{ define "filetree" }}
	<ul>
		{{ range $childName, $child := .Children }}
		<li>
			{{ if $child.IsDir }}
				<!-- directory entry -->
				<details {{ if $child.IsActive }} open="" {{ end }}>
					<summary class="dir name">
						<a href="{{ objectPath $.ObjectID $child.Path }}"> {{ $childName }} </a>
					</summary>
					{{ template "filetree" $child }}
				</details>
			{{ else }}
				<!-- file entry -->
				{{ $childName }}
			{{ end }}
		</li>
		{{ end }}
	</ul>
{{ end }}
